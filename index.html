<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康证明</title>
    <style>
        /* 清除默认边距，让图片完美居中 */
        * {
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f7fa;   /* 浅灰背景，不刺眼 */
        }
        img {
            max-width: 95%;
            max-height: 95vh;
            border-radius: 12px;    /* 圆角 */
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15); /* 柔和阴影 */
        }
    </style>
</head>
<body>
    <!-- 直接引用同目录下的图片文件 -->
    <img src="IMG_20260703_221646.jpg" alt="烟台市从业人员健康检查合格证明">
</body>
</html>
